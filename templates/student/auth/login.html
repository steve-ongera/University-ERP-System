<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | University Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #1a73e8;
      --blue-dark: #0d5bba;
      --blue-light: rgba(26,115,232,0.12);
      --gray-50: #f8f9fc;
      --gray-100: #f1f3f7;
      --gray-300: #d1d5db;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --white: #ffffff;
      --radius: 14px;
      --shadow: 0 8px 40px rgba(0,0,0,0.10), 0 1.5px 6px rgba(0,0,0,0.06);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-50);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      background-image:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(26,115,232,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 90%, rgba(26,115,232,0.06) 0%, transparent 70%);
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 440px;
      padding: 48px 44px 40px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--blue), #4f9cf9);
      border-radius: var(--radius) var(--radius) 0 0;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo-wrap {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: var(--blue-light);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo-wrap svg { width: 32px; height: 32px; }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      color: var(--gray-900);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }

    .header p {
      font-size: 0.9rem;
      color: var(--gray-500);
    }

    /* ── Alert ── */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.875rem;
      margin-bottom: 24px;
      line-height: 1.4;
    }
    .alert-error { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
    .alert-success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .alert svg { flex-shrink: 0; margin-top: 1px; }
    .alert-close {
      margin-left: auto;
      background: none;
      border: none;
      cursor: pointer;
      color: inherit;
      opacity: 0.6;
      padding: 0;
      line-height: 1;
      font-size: 1rem;
    }
    .alert-close:hover { opacity: 1; }

    /* ── Form ── */
    .field { margin-bottom: 20px; }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 7px;
      letter-spacing: 0.01em;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 11px 14px;
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--gray-900);
      background: var(--gray-50);
      border: 1.5px solid var(--gray-300);
      border-radius: 10px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--blue);
      background: var(--white);
      box-shadow: 0 0 0 3px var(--blue-light);
    }

    input::placeholder { color: var(--gray-300); }

    /* ── Password wrapper ── */
    .pw-wrap { position: relative; }

    .pw-wrap input { padding-right: 46px; }

    .eye-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }

    .eye-btn:hover { color: var(--blue); background: var(--blue-light); }
    .eye-btn:focus { outline: 2px solid var(--blue); outline-offset: 2px; }

    .eye-btn svg { width: 20px; height: 20px; pointer-events: none; }

    /* ── Row ── */
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .remember {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.875rem;
      color: var(--gray-700);
      user-select: none;
    }

    .remember input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--blue);
      cursor: pointer;
      border-radius: 4px;
    }

    .forgot {
      font-size: 0.875rem;
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .forgot:hover { color: var(--blue-dark); text-decoration: underline; }

    /* ── Submit ── */
    .btn-submit {
      width: 100%;
      padding: 13px;
      background: var(--blue);
      color: var(--white);
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: 0.01em;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(26,115,232,0.3);
    }

    .btn-submit:hover {
      background: var(--blue-dark);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26,115,232,0.4);
    }

    .btn-submit:active { transform: translateY(0); }

    /* ── Footer ── */
    .footer-text {
      text-align: center;
      margin-top: 22px;
      font-size: 0.875rem;
      color: var(--gray-500);
    }

    .footer-text a {
      color: var(--blue);
      font-weight: 600;
      text-decoration: none;
    }

    .footer-text a:hover { text-decoration: underline; }

    .copy {
      text-align: center;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--gray-500);
      line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .card {
        padding: 36px 24px 30px;
      }

      .header h1 { font-size: 1.5rem; }

      .row {
        flex-direction: column;
        align-items: flex-start;
        margin-bottom: 20px;
      }
    }

    @media (max-width: 360px) {
      .card { padding: 28px 16px 24px; }
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="header">
    <div class="logo-wrap">
      <!-- University cap icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
        <path d="M6 12v5c3.6 2 8.4 2 12 0v-5"/>
      </svg>
    </div>
    <h1>Welcome Back</h1>
    <p>Sign in to your University Portal</p>
  </div>

  <!-- Demo alert (remove in production) -->
  <div class="alert alert-error" id="demo-alert" style="display:none;">
    <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-1-7V7h2v4H9zm0 2h2v2H9v-2z" clip-rule="evenodd"/></svg>
    <span>Invalid username or password. Please try again.</span>
    <button class="alert-close" onclick="this.closest('.alert').remove()" aria-label="Dismiss">&times;</button>
  </div>

  <!-- Form -->
  <form id="login-form" novalidate>

    <div class="field">
      <label for="username">Username</label>
      <input
        type="text"
        id="username"
        name="username"
        placeholder="Student No / Employee No"
        autocomplete="username"
        required
      />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="pw-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          autocomplete="current-password"
          required
        />
        <button
          type="button"
          class="eye-btn"
          id="eye-btn"
          aria-label="Show password"
          title="Toggle password visibility"
        >
          <!-- Eye icon (shown when password is hidden) -->
          <svg id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- Eye-off icon (shown when password is visible) -->
          <svg id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;">
            <path d="M17.94 17.94A10.94 10.94 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember" name="RememberMe">
        Remember me
      </label>
      <a href="#" class="forgot">Forgot Password?</a>
    </div>

    <button type="submit" class="btn-submit">Sign In</button>

    <p class="footer-text">
      Don't have an account? <a href="#">Sign Up</a>
    </p>

  </form>
</div>

<p class="copy">
  &copy; <span id="year"></span> University Management System<br>
  kemcom softwares ltd
</p>

<script>
  // Year
  document.getElementById('year').textContent = new Date().getFullYear();

  // ── Password Toggle ──
  const eyeBtn    = document.getElementById('eye-btn');
  const pwInput   = document.getElementById('password');
  const iconEye   = document.getElementById('icon-eye');
  const iconOff   = document.getElementById('icon-eye-off');

  eyeBtn.addEventListener('click', function () {
    const isHidden = pwInput.type === 'password';

    pwInput.type     = isHidden ? 'text' : 'password';
    iconEye.style.display = isHidden ? 'none'  : '';
    iconOff.style.display = isHidden ? ''      : 'none';

    eyeBtn.setAttribute('aria-label', isHidden ? 'Hide password' : 'Show password');
    pwInput.focus();
  });

  // ── Form demo feedback ──
  document.getElementById('login-form').addEventListener('submit', function (e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;

    if (!u || !p) {
      const a = document.getElementById('demo-alert');
      a.querySelector('span').textContent = 'Please fill in all fields.';
      a.style.display = 'flex';
      return;
    }

    // Replace with real form submission
    // this.submit();
    const a = document.getElementById('demo-alert');
    a.className = 'alert alert-success';
    a.querySelector('svg').innerHTML = '<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>';
    a.querySelector('span').textContent = 'Login successful! Redirecting…';
    a.style.display = 'flex';
  });
</script>

</body>
</html>
